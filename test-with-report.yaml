reporting:
  - module: final-stats
  - module: console
  - module: junit-xml
    filename: report.xml
  - module: blazemeter
    report-name: "Local Test Report"

execution:
  - concurrency: 10
    hold-for: 15s
    scenario: report

scenarios:
  report:
    requests:
      - url: https://httpbin.org/get
        method: GET

version: "3.9"

services:
  agent:
    build:
      context: .
      dockerfile: Dockerfile
    image: repo-gotowe-agent:local
    container_name: repo-gotowe-agent
    ports:
      - "8088:8088"
    environment:
      - LOAD_TEST_TARGET_URL=${LOAD_TEST_TARGET_URL:-https://jsonplaceholder.typicode.com}
      - LOAD_TEST_CONCURRENCY=${LOAD_TEST_CONCURRENCY:-5}
      - LOAD_TEST_DURATION_SECONDS=${LOAD_TEST_DURATION_SECONDS:-30}
    volumes:
      - .:/app
    working_dir: /app
    command: [ "python", "src/agent.py", "--server" ]
    restart: unless-stopped

  tests:
    build:
      context: .
      dockerfile: Dockerfile
    image: repo-gotowe-agent:local
    container_name: repo-gotowe-tests
    volumes:
      - .:/app
    working_dir: /app
    command: [ "python", "-m", "pytest", "tests/", "-v" ]
    profiles:
      - test

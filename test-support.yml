---
# Taurus configuration for Support/Production environment testing
# Use: & $bzt test-support.yml
# Or from VS Code: Ctrl+Shift+P > Tasks: Run Task > "Taurus: Standard API Run Advanced Config" + modify to use this file

scenarios:
  api_test:
    requests:
      # TODO: Replace with actual support/production API endpoints
      - url: https://support-api.example.com/api/v1/health
        label: Health Check
        method: GET

      - url: https://support-api.example.com/api/v1/posts
        label: List Posts
        method: GET

      - url: https://support-api.example.com/api/v1/posts
        method: POST
        label: Create Post
        body:
          title: Support Test Post
          body: This is a support environment test post
          userId: 1

execution:
  - concurrency: 5
    hold-for: 5m
    ramp-up: 1m
    scenario: api_test
    throughput: 30

reporting:
  - module: console
  - module: final-stats
    summary: true
    percentiles: true
    summary-labels: true
    failed-labels: true
    test-duration: true
  - module: passfail
    criteria:
      - fail>5% for 30s, stop as failed
      - avg-rt>3s for 30s, stop as failed
  - module: blazemeter
    token: TWOJ_TOKEN_SUPPORT

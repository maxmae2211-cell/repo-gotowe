name: Publish Taurus Report

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run pipeline
        run: |
          python run_pipeline.py \
            --jtl tests/fixtures/sample.jtl \
            --max-failures 0 \
            --max-avg-ms 200
      - name: Upload HTML report artifact
        uses: actions/upload-artifact@v4
        with:
          name: taurus-locust-report
          path: taurus-locust-report.html

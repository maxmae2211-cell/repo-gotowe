name: Taurus Pipeline

on:
    push:
        branches: [ main ]
    workflow_dispatch:

jobs:
    test:
        runs-on: windows-latest
        env:
            FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        steps:
            - uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.10"

            - name: Install dependencies
              run: |
                  python -m venv .venv
                  .venv\Scripts\activate
                  pip install -r requirements.txt

            - name: Run Taurus pipeline
              run: |
                  .venv\Scripts\activate
                  python run_pipeline.py

            - name: Upload Taurus report
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: taurus-report
                  path: |
                      taurus-report-*.zip
                      *.html
                  retention-days: 7

name: Full Automation Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run Taurus pipeline
        run: python run_pipeline.py --jtl tests/fixtures/sample.jtl --max-failures 1 --max-avg-ms 200
      - name: Run tests (pytest)
        run: pytest tests/ -v

  test-ubuntu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Taurus pipeline
        run: python run_pipeline.py --jtl tests/fixtures/sample.jtl --max-failures 1 --max-avg-ms 200
      - name: Run tests (pytest)
        run: pytest tests/ -v

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install flake8
      - name: Run flake8
        run: flake8 . --count --statistics --output-file=flake8_report.txt || true
      - name: Upload flake8_report.txt
        uses: actions/upload-artifact@v4
        with:
          name: flake8_report
          path: flake8_report.txt

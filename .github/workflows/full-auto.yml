name: Full Automation Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test-windows:
    runs-on: windows-latest
    env:
      PYTHONIOENCODING: utf-8
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv\Scripts\activate
          pip install -r requirements.txt
      - name: Run Taurus pipeline
        run: |
          .venv\Scripts\activate
          python run_pipeline.py --jtl tests/fixtures/sample.jtl
      - name: Run tests (pytest)
        run: |
          .venv\Scripts\activate
          pytest
      - name: Run documentation crawler
        run: |
          .venv\Scripts\activate
          python vscode_docs_crawler.py
      - name: Upload ALL_DOCS.md
        uses: actions/upload-artifact@v4
        with:
          name: ALL_DOCS
          path: docs_summary/ALL_DOCS.md
      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        with:
          name: TaurusReport
          path: taurus-locust-report.html
      - name: Send e-mail notification
        continue-on-error: true
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "Taurus pipeline: ${{ job.status }}"
          to: ${{ secrets.MAIL_TO }}
          from: ${{ secrets.MAIL_USERNAME }}
          body: |
            Wynik workflow: ${{ job.status }}
            Repo: ${{ github.repository }}
            Commit: ${{ github.sha }}
            Szczegóły: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  test-ubuntu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Taurus pipeline
        run: python run_pipeline.py --jtl tests/fixtures/sample.jtl
      - name: Run tests (pytest)
        run: pytest
      - name: Run documentation crawler
        run: python vscode_docs_crawler.py
      - name: Upload ALL_DOCS.md
        uses: actions/upload-artifact@v4
        with:
          name: ALL_DOCS
          path: docs_summary/ALL_DOCS.md
      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        with:
          name: TaurusReport
          path: taurus-locust-report.html
      - name: Send e-mail notification
        continue-on-error: true
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "Taurus pipeline: ${{ job.status }}"
          to: ${{ secrets.MAIL_TO }}
          from: ${{ secrets.MAIL_USERNAME }}
          body: |
            Wynik workflow: ${{ job.status }}
            Repo: ${{ github.repository }}
            Commit: ${{ github.sha }}
            Szczegóły: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install black flake8
      - name: Run black
        run: black --check .
      - name: Run flake8
        run: flake8 . > flake8_report.txt; exit 0
      - name: Upload flake8_report.txt
        uses: actions/upload-artifact@v4
        with:
          name: flake8_report
          path: flake8_report.txt

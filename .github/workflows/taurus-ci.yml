name: Taurus CI

on:
    push:
        branches:
            - main
            - qq
    pull_request:
        branches:
            - main
    workflow_dispatch:

jobs:
    # --- Job 1: Health check (bzt --version + walidacja konfiguracji) ---
    bzt-health-check:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.10"

            - name: Install Taurus
              run: |
                  python -m pip install --upgrade pip
                  pip install bzt PyYAML

            - name: Check bzt version and health
              run: |
                  bzt --version
                  python -c "import yaml; print('PyYAML OK:', yaml.__version__)"

            - name: Validate YAML configs (dry-run)
              run: |
                  python -c "
                  import yaml, sys, glob
                  configs = glob.glob('test-*.yml')
                  failed = []
                  for f in configs:
                      try:
                          with open(f) as fh:
                              yaml.safe_load(fh)
                          print('OK:', f)
                      except Exception as e:
                          print('FAIL:', f, str(e))
                          failed.append(f)
                  if failed:
                      sys.exit(1)
                  "

    # --- Job 2: Szybki test API (smoke test w CI, skrócony do 15s) ---
    bzt-api-smoke:
        runs-on: ubuntu-latest
        needs: bzt-health-check

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.10"

            - name: Install Taurus + Java (JMeter fallback)
              run: |
                  python -m pip install --upgrade pip
                  pip install bzt PyYAML
                  sudo apt-get install -y default-jre-headless

            - name: Run API smoke test (skrócony, 15s)
              run: |
                  bzt test-api.yml \
                    -o execution.0.hold-for=15s \
                    -o execution.0.ramp-up=5s \
                    -o execution.0.concurrency=2

            - name: Run support config smoke test (skrócony, 15s)
              run: |
                  bzt test-support.yml \
                    -o execution.0.hold-for=15s \
                    -o execution.0.ramp-up=5s \
                    -o execution.0.concurrency=2 \
                    -o execution.1.hold-for=15s \
                    -o execution.1.ramp-up=5s \
                    -o execution.1.concurrency=2

    # --- Job 3: Analiza artefaktów + generowanie raportu HTML ---
    validate-pipeline:
        runs-on: ubuntu-latest

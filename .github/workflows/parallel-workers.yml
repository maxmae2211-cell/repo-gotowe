name: Parallel Workers CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# ─────────────────────────────────────────────────────────────────────────────
# Workers run in parallel; "report" aggregates results from all of them.
# ─────────────────────────────────────────────────────────────────────────────
jobs:

  # ── Worker A: Lint (black + flake8) ──────────────────────────────────────
  worker-lint:
    name: "Worker A — Lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install linters
        run: pip install black flake8
      - name: black --check
        run: black --check .
      - name: flake8 report
        run: flake8 . --max-line-length=120 > flake8_report.txt; exit 0
      - name: Upload flake8 report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flake8-report
          path: flake8_report.txt

  # ── Worker B: Unit tests (matrix: 3.10, 3.11, 3.12) ─────────────────────
  worker-tests:
    name: "Worker B — Tests (Python ${{ matrix.python-version }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run pytest
        run: python -m pytest tests/ -v --tb=short

  # ── Worker C: Pipeline validation (fixture JTL) ───────────────────────────
  worker-pipeline:
    name: "Worker C — Pipeline (fixture JTL)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run analysis pipeline
        run: |
          python run_pipeline.py \
            --jtl tests/fixtures/sample.jtl \
            --max-failures 0 \
            --max-avg-ms 200 \
            --output taurus-locust-report.html
      - name: Upload pipeline report
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-report
          path: taurus-locust-report.html
          if-no-files-found: ignore

  # ── Worker D: Cross-platform check (Windows) ─────────────────────────────
  worker-windows:
    name: "Worker D — Windows cross-platform"
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv\Scripts\python.exe -m pip install --upgrade pip
          .venv\Scripts\python.exe -m pip install -r requirements.txt
      - name: Run pytest
        run: .venv\Scripts\python.exe -m pytest tests/ -v --tb=short

  # ── Aggregator: collects exit codes from all workers ─────────────────────
  report:
    name: "Aggregator — All workers done"
    runs-on: ubuntu-latest
    needs: [worker-lint, worker-tests, worker-pipeline, worker-windows]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "=== Worker results ==="
          echo "Lint    : ${{ needs.worker-lint.result }}"
          echo "Tests   : ${{ needs.worker-tests.result }}"
          echo "Pipeline: ${{ needs.worker-pipeline.result }}"
          echo "Windows : ${{ needs.worker-windows.result }}"
          # Fail the aggregator if any required worker failed
          if [[ "${{ needs.worker-lint.result }}"     == "failure" || \
                "${{ needs.worker-tests.result }}"    == "failure" || \
                "${{ needs.worker-pipeline.result }}" == "failure" || \
                "${{ needs.worker-windows.result }}"  == "failure" ]]; then
            echo "❌ One or more workers failed."
            exit 1
          fi
          echo "✅ All workers passed."

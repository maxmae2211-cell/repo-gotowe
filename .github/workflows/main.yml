name: Main CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Testy jednostkowe
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Konfiguracja Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalacja zależności
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Uruchomienie testów (pytest)
        run: pytest -v --tb=short

  lint:
    name: Analiza kodu (flake8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Konfiguracja Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalacja flake8
        run: pip install flake8

      - name: Uruchomienie flake8
        run: flake8 . --count --statistics --output-file=flake8_report.txt || true

      - name: Wgraj raport flake8
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flake8-report
          path: flake8_report.txt

  pipeline:
    name: Walidacja pipeline Taurus
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Konfiguracja Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalacja zależności
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Uruchomienie pipeline z fiksturą JTL
        run: |
          python run_pipeline.py \
            --jtl tests/fixtures/sample.jtl \
            --max-failures 0 \
            --max-avg-ms 200 \
            --output taurus-locust-report.html

      - name: Wgraj raport HTML
        uses: actions/upload-artifact@v4
        with:
          name: taurus-locust-report
          path: taurus-locust-report.html
          if-no-files-found: error

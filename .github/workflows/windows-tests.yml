name: Windows Taurus Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  test-windows:
    name: Run Tests on Windows
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install bzt selenium

      - name: Run tests with Python script
        run: |
          cd ${{ github.workspace }}
          python scripts\run-tests.py
        timeout-minutes: 45
        shell: powershell

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: windows-test-results
          path: ~/.bzt-artifacts/
          retention-days: 30

  lint-yaml:
    name: Validate Test YAML Configs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install YAML validator
        run: pip install pyyaml

      - name: Validate all test YAML files
        run: |
          python -c "
          import yaml
          import glob
          import sys

          files = glob.glob('tests/**/*.yml', recursive=True)
          errors = []

          for f in files:
              try:
                  with open(f) as file:
                      yaml.safe_load(file)
                  print(f'✓ {f}')
              except Exception as e:
                  errors.append(f'{f}: {e}')
                  print(f'✗ {f}: {e}')

          if errors:
              print(f'\n{len(errors)} file(s) with errors')
              sys.exit(1)
          else:
              print(f'\n✓ All {len(files)} test files are valid')
          "

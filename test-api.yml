---
scenarios:
  api_test:
    requests:
      - url: https://jsonplaceholder.typicode.com/posts/1
        label: Get Post 1

      - url: https://jsonplaceholder.typicode.com/posts
        method: POST
        label: Create Post
        body:
          title: Test Post
          body: This is a test post
          userId: 1

execution:
  - concurrency: 10
    hold-for: 2m
    ramp-up: 30s
    scenario: api_test
    throughput: 50

reporting:
  - module: final-stats
    summary: true
    percentiles: true
    summary-labels: true
    failed-labels: true
    test-duration: true
  - module: passfail
    criteria:
      - fail>10% for 30s, stop as failed
      - avg-rt>5s for 30s, stop as failed
  - module: blazemeter

modules:
  blazemeter:
    test: Taurus API Test

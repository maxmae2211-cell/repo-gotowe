execution:
  - concurrency: 20
    hold-for: 20s
    scenario: local

scenarios:
  local:
    requests:
      - url: http://api:8080/
        method: GET
      - url: http://api:8080/health
        method: GET
      - url: http://api:8080/users
        method: POST
        body: '{"name": "Max"}'
        headers:
          Content-Type: application/json

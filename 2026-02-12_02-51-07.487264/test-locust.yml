---
# Konfiguracja Locust z Taurus

scenarios:
  locust_test:
    script: test-locust.py
    base-url: https://jsonplaceholder.typicode.com

execution:
  - concurrency: 5
    ramp-up: 30s
    hold-for: 2m
    scenario: locust_test
    throughput: 50

modules:
  locust:
    distributed: false  # true dla testów rozproszonego obciążenia
    
reporting:
  - module: console

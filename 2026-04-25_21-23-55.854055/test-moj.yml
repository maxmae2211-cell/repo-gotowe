---
scenarios:
  moj_test:
    requests:
      - url: https://jsonplaceholder.typicode.com/users/1
        label: Get User 1
      - url: https://jsonplaceholder.typicode.com/users
        method: POST
        label: Create User
        body:
          name: Test User
          username: testuser
          email: testuser@example.com

execution:
  - concurrency: 5
    hold-for: 1m
    ramp-up: 15s
    scenario: moj_test
    throughput: 20

modules:
  request:
    concurrency: 5

reporting:
  - module: console

---
# Minimalny, bezpieczny config użytkownika dla Taurusa
# Bez żadnego console, bez dodatkowych reporterów

settings:
  aggregator: consolidator

reporting: []
services: []
modules: {}

cli:
  linter:
    disable: false
    warn-on-unfamiliar-fields: false
    ignored-warnings: []
    lint-and-exit: false
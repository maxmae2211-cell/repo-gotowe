execution:
  - concurrency: 10
    hold-for: 20s
    scenario: multi

scenarios:
  multi:
    requests:
      - url: https://httpbin.org/get
        method: GET
      - url: https://httpbin.org/post
        method: POST
        body: '{"msg": "hello"}'
        headers:
          Content-Type: application/json
      - url: https://httpbin.org/status/200
        method: GET
